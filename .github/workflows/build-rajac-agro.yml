name: Build Rajac agro daily

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Колико дана уназад скенирати (1-30)'
        required: false
        default: '10'
      scale:
        description: 'Резолуција у метрима'
        required: false
        default: '10'
      force:
        description: 'Поново обради и постојеће дане (true/false)'
        required: false
        default: 'false'
  schedule:
    # 05:00 UTC = 07:00 по нашем времену (лети)
    - cron: '0 5 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run daily Sentinel-2 processor
        env:
          GEE_PROJECT: deft-epigram-414409
          GEE_SERVICE_ACCOUNT_JSON: ${{ secrets.GEE_SERVICE_ACCOUNT_JSON }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '10' }}
          SCALE: ${{ github.event.inputs.scale || '10' }}
          FORCE_FLAG: ${{ github.event.inputs.force || 'false' }}
        run: |
          ARGS="--lookback-days $LOOKBACK_DAYS --scale $SCALE"
          if [ "$FORCE_FLAG" = "true" ]; then ARGS="$ARGS --force"; fi
          python daily_processor.py $ARGS

      - name: Send email for new alerts
        if: success()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
        run: python email_notifier.py

      - name: Show generated results
        if: always()
        run: |
          echo "Daily tree:"
          find public/daily -maxdepth 1 -type f -print | sort | tail -30 || true
          echo "Alerts:"
          find public/alerts -maxdepth 1 -type f -print | sort || true
          echo "Trends:"
          find public/trends -maxdepth 1 -type f -print | sort || true

      - name: Commit daily results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/daily public/alerts public/trends || true
          if git diff --staged --quiet; then
            echo "No daily changes to commit."
          else
            git commit -m "Daily Sentinel-2 agro update + alerts ($(date -u +%Y-%m-%d))"
            git push
          fi
