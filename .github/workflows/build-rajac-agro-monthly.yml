name: Build Rajac agro data (monthly)

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Од које године (укључно)'
        required: false
        default: '2026'
      start_month:
        description: 'Од којег месеца (укључно, 1-12)'
        required: false
        default: '1'
      scale:
        description: 'Резолуција у метрима (10 = Sentinel-2 native)'
        required: false
        default: '10'
  schedule:
    - cron: '0 5 9 * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Build Sentinel-2 agro results (monthly)
        env:
          GEE_PROJECT: deft-epigram-414409
          GEE_SERVICE_ACCOUNT_JSON: ${{ secrets.GEE_SERVICE_ACCOUNT_JSON }}
          START_YEAR: ${{ github.event.inputs.start_year || '2026' }}
          START_MONTH: ${{ github.event.inputs.start_month || '1' }}
          SCALE: ${{ github.event.inputs.scale || '10' }}
        run: |
          python processor.py \
            --start-year "$START_YEAR" \
            --start-month "$START_MONTH" \
            --scale "$SCALE"

      - name: Show generated results
        if: always()
        run: |
          echo "Results tree:"
          find public/results -maxdepth 2 -type f -print | sort || true

      - name: Commit generated JSON results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/results || true
          if git diff --staged --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Update Rajac agro parcels JSON results (monthly)"
            git push
          fi
